name: Deploy Portfolio to GitHub Pages

on:
  # Runs on every push to main branch
  push:
    branches: [main]
  # Allows manual trigger from the GitHub Actions tab
  workflow_dispatch:

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; skip queued runs but don't cancel in-progress
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Job 1: Build ────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm            # caches node_modules between runs → faster builds

      - name: Install dependencies
        run: npm ci             # clean install from package-lock.json

      - name: Build project
        run: npm run build      # outputs to dist/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload dist/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist            # the folder Vite builds into

  # ── Job 2: Deploy ───────────────────────────────────────────────────────────
  deploy:
    needs: build                # only runs if build succeeds
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}   # shows live URL in Actions tab
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
